# ===== Database =====
# Par defaut, le backend demarre seul en local avec H2 fichier.
# Pour utiliser PostgreSQL, definir les variables d'environnement Spring standard.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./.data/padeldb;MODE=PostgreSQL;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.main.allow-bean-definition-overriding=true

# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== JWT Configuration =====
jwt.secret=02c477941249bfd9b6639683ae9ed1a2e8d5cb08b2ec8d96f9c83d1434613bb5
jwt.expiration=86400000

# ===== Swagger / OpenAPI Configuration =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ===== H2 Console =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
